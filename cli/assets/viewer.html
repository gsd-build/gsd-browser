<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>gsd-cursor viewer</title>
<style nonce="__GSD_VIEWER_NONCE__">
  :root { color-scheme: dark; }
  html, body { margin: 0; padding: 0; background: #0a0a0c; color: #ddd; font-family: -apple-system, ui-sans-serif, system-ui, sans-serif; height: 100%; overflow: hidden; }
  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #wrap {
    position: relative;
    aspect-ratio: var(--frame-w, 1920) / var(--frame-h, 1080);
    max-width: 100vw;
    max-height: 100vh;
    width: min(100vw, calc(100vh * var(--frame-ratio, 1.7777778)));
    height: min(100vh, calc(100vw / var(--frame-ratio, 1.7777778)));
    box-shadow: 0 8px 60px rgba(0,0,0,0.6);
    background: #111;
  }
  #frame {
    width: 100%;
    height: 100%;
    display: block;
    image-rendering: crisp-edges;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
  }
  #status {
    position: fixed;
    bottom: 12px; left: 12px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-family: ui-monospace, Menlo, monospace;
    color: #aaa;
  }
  #status.live::before {
    content: "●";
    color: #2ecc71;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 50% { opacity: 0.3; } }

  /* Control bar */
  #controls {
    position: fixed;
    top: 12px; right: 12px;
    display: flex;
    gap: 8px;
    z-index: 10;
  }
  .ctrl-btn {
    background: rgba(20, 20, 24, 0.85);
    backdrop-filter: blur(12px);
    color: #ddd;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: background 120ms ease, color 120ms ease, border-color 120ms ease;
  }
  .ctrl-btn:hover { background: rgba(40, 40, 48, 0.95); }
  .ctrl-btn.active { background: rgba(76, 194, 255, 0.18); color: #4cc2ff; border-color: rgba(76, 194, 255, 0.5); }
  .ctrl-btn.danger:hover { background: rgba(220, 60, 60, 0.25); color: #ff8a8a; border-color: rgba(220, 60, 60, 0.5); }
  .ctrl-btn .key {
    margin-left: 8px;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 10px;
    opacity: 0.5;
    border: 1px solid rgba(255,255,255,0.15);
    padding: 1px 5px;
    border-radius: 4px;
  }
  #approval {
    position: fixed;
    top: 12px; left: 12px;
    z-index: 11;
    display: none;
    width: min(420px, calc(100vw - 24px));
    background: rgba(26, 22, 18, 0.94);
    border: 1px solid rgba(255, 190, 110, 0.38);
    box-shadow: 0 10px 40px rgba(0,0,0,0.35);
    padding: 10px;
    border-radius: 8px;
  }
  #approval.show {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 8px;
    align-items: center;
  }
  #approval-summary {
    font-size: 13px;
    line-height: 1.25;
    color: #ffe1b8;
    overflow-wrap: anywhere;
  }
  #approval-origin {
    display: block;
    margin-top: 2px;
    color: #b8aaa0;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 11px;
  }
  .approval-btn {
    border: 1px solid rgba(255,255,255,0.16);
    color: #f3f0eb;
    background: rgba(255,255,255,0.08);
    border-radius: 7px;
    padding: 7px 10px;
    cursor: pointer;
  }
  .approval-btn.primary {
    background: rgba(255, 190, 110, 0.22);
    border-color: rgba(255, 190, 110, 0.48);
  }

  /* History rail */
  #history {
    position: fixed;
    top: 70px; right: 12px;
    bottom: 70px;
    width: 260px;
    overflow-y: auto;
    z-index: 8;
    display: flex;
    flex-direction: column-reverse;
    gap: 6px;
    padding-right: 6px;
    pointer-events: none;
  }
  body.history-only #stage,
  body.history-only #goal,
  body.history-only #controls {
    display: none;
  }
  body.history-only #status {
    top: 12px;
    bottom: auto;
  }
  body.history-only #history {
    top: 52px;
    right: 50%;
    bottom: 24px;
    transform: translateX(50%);
    width: min(720px, calc(100vw - 32px));
    flex-direction: column;
    pointer-events: auto;
  }
  body.history-only .hist-item {
    min-height: 42px;
    font-size: 14px;
  }
  #history::-webkit-scrollbar { width: 6px; }
  #history::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  .hist-item {
    background: rgba(20, 20, 24, 0.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 8px 12px;
    color: #ddd;
    font-size: 12px;
    pointer-events: auto;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 120ms ease, border-color 120ms ease;
    flex-shrink: 0;
  }
  .hist-item:hover { background: rgba(40, 40, 48, 0.95); border-color: rgba(76, 194, 255, 0.4); }
  .hist-item .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .hist-item.success .dot { background: #4cc2ff; }
  .hist-item.fail .dot { background: #ff6464; }
  .hist-item.pending .dot { background: #ffd54a; animation: pulse 1.2s infinite; }
  .hist-item .label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hist-item .time { font-family: ui-monospace, Menlo, monospace; font-size: 10px; opacity: 0.5; flex-shrink: 0; }
  #hist-preview {
    position: fixed;
    pointer-events: none;
    border: 2px solid rgba(76, 194, 255, 0.6);
    border-radius: 8px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.7);
    max-width: 480px;
    max-height: 320px;
    z-index: 11;
    opacity: 0;
    transition: opacity 120ms ease;
    background: #000;
  }
  #hist-preview.show { opacity: 1; }

  /* Goal banner */
  #goal {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20, 20, 24, 0.85);
    backdrop-filter: blur(12px);
    color: #fff;
    padding: 10px 18px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    max-width: 60vw;
    text-align: center;
    z-index: 9;
    opacity: 0;
    pointer-events: none;
    transition: opacity 240ms ease;
  }
  #goal.show { opacity: 1; }
  #goal::before {
    content: "🎯";
    margin-right: 8px;
    opacity: 0.7;
  }

  /* Cursor */
  .cursor {
    transition: transform 320ms cubic-bezier(0.22, 0.61, 0.36, 1);
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.7));
  }

  /* Target ring */
  .ring {
    fill: none;
    stroke: #4cc2ff;
    stroke-width: 3;
    opacity: 0;
    transition: opacity 200ms ease;
  }
  .ring.armed {
    opacity: 0.95;
    animation: ringPulse 0.8s ease-out infinite;
  }
  @keyframes ringPulse {
    0% { stroke-width: 3; opacity: 1; }
    50% { stroke-width: 6; opacity: 0.6; }
    100% { stroke-width: 3; opacity: 1; }
  }

  /* Click ripple */
  .ripple {
    fill: #ffd54a;
    fill-opacity: 0.5;
    stroke: #ffd54a;
    stroke-width: 2;
    animation: rippleAnim 600ms ease-out forwards;
  }
  .ripple.fail {
    fill: #ff6464;
    stroke: #ff6464;
    animation: rippleFail 800ms ease-out forwards;
  }
  @keyframes rippleAnim {
    0% { r: 8; fill-opacity: 0.5; stroke-opacity: 1; }
    100% { r: 60; fill-opacity: 0; stroke-opacity: 0; }
  }
  @keyframes rippleFail {
    0% { r: 8; fill-opacity: 0.6; stroke-opacity: 1; stroke-width: 3; }
    100% { r: 80; fill-opacity: 0; stroke-opacity: 0; stroke-width: 1; }
  }
  /* Failure X — drawn briefly at the failure point */
  .fail-x {
    stroke: #ff6464;
    stroke-width: 4;
    stroke-linecap: round;
    fill: none;
    animation: failX 800ms ease-out forwards;
  }
  @keyframes failX {
    0% { opacity: 1; transform: scale(0.4); }
    30% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.2); }
  }

  /* Action label */
  #label {
    position: absolute;
    background: rgba(20, 20, 24, 0.92);
    backdrop-filter: blur(12px);
    color: #fff;
    padding: 6px 12px;
    border-radius: 18px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.01em;
    transform: translate(-50%, -120%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 200ms ease, transform 320ms cubic-bezier(0.22, 0.61, 0.36, 1);
    white-space: nowrap;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  }
  #label.show { opacity: 1; }

  /* Ref hover boxes */
  #refs { pointer-events: auto; }
  .ref-box {
    fill: transparent;
    stroke: rgba(76, 194, 255, 0);
    stroke-width: 1.5;
    cursor: crosshair;
    transition: stroke 120ms ease, fill 120ms ease;
  }
  .ref-box:hover {
    stroke: rgba(76, 194, 255, 0.9);
    fill: rgba(76, 194, 255, 0.08);
  }
  .annotation-mark {
    fill: rgba(255, 213, 74, 0.24);
    stroke: rgba(255, 213, 74, 0.98);
    stroke-width: 5;
    pointer-events: none;
    filter: drop-shadow(0 2px 10px rgba(0,0,0,0.85));
  }
  .annotation-mark-core {
    fill: rgba(20, 20, 24, 0.96);
    stroke: rgba(255,255,255,0.98);
    stroke-width: 3;
    pointer-events: none;
  }
  #ref-tip {
    position: absolute;
    background: rgba(20, 20, 24, 0.95);
    backdrop-filter: blur(12px);
    color: #fff;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-family: ui-monospace, Menlo, monospace;
    pointer-events: none;
    opacity: 0;
    transition: opacity 120ms ease;
    white-space: nowrap;
    border: 1px solid rgba(76, 194, 255, 0.3);
    transform: translate(-50%, -130%);
  }
  #ref-tip.show { opacity: 1; }
  #text-proxy {
    position: fixed;
    left: -1000px;
    top: -1000px;
    width: 1px;
    height: 1px;
    opacity: 0;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="stage">
  <div id="wrap">
    <img id="frame" alt="">
    <svg id="overlay" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet">
      <g id="refs"></g>
      <g id="annotation-markers"></g>
      <rect id="ring" class="ring" x="0" y="0" width="0" height="0" rx="6" ry="6"></rect>
      <g id="ripples"></g>
      <!-- macOS-style arrow cursor at (0,0) origin -->
      <g id="cursor" class="cursor" transform="translate(960, 540)">
        <path d="M0 0 L0 28 L7 22 L11 32 L15 30 L11 20 L20 20 Z"
              fill="#fff" stroke="#000" stroke-width="1.5" stroke-linejoin="round"/>
      </g>
    </svg>
    <div id="label"></div>
    <div id="ref-tip"></div>
  </div>
</div>
<div id="status">connecting…</div>
<div id="goal"></div>
<div id="history"></div>
<img id="hist-preview" alt="">
<div id="approval">
  <div id="approval-summary"></div>
  <button id="approval-approve" class="approval-btn primary">Approve</button>
  <button id="approval-deny" class="approval-btn">Deny</button>
</div>
<div id="controls">
  <button id="btn-control" class="ctrl-btn">Control</button>
  <button id="btn-annotate" class="ctrl-btn">Annotate</button>
  <button id="btn-record" class="ctrl-btn">Record</button>
  <button id="btn-sensitive" class="ctrl-btn">Sensitive</button>
  <button id="btn-pause" class="ctrl-btn" aria-label="Pause">Pause<span class="key" aria-hidden="true">Space</span></button>
  <button id="btn-step" class="ctrl-btn" aria-label="Step">Step<span class="key" aria-hidden="true">Right</span></button>
  <button id="btn-resume" class="ctrl-btn">Resume</button>
  <button id="btn-abort" class="ctrl-btn danger" aria-label="Abort">Abort<span class="key" aria-hidden="true">Esc</span></button>
</div>
<input id="text-proxy" autocomplete="off" autocapitalize="off" spellcheck="false" aria-hidden="true">

<script nonce="__GSD_VIEWER_NONCE__">
const frame = document.getElementById('frame');
const cursor = document.getElementById('cursor');
const ring = document.getElementById('ring');
const ripples = document.getElementById('ripples');
const refsGroup = document.getElementById('refs');
const annotationMarkersGroup = document.getElementById('annotation-markers');
const refTip = document.getElementById('ref-tip');
const label = document.getElementById('label');
const wrap = document.getElementById('wrap');
const status = document.getElementById('status');
const params = new URLSearchParams(location.search);
const historyOnly = params.has('history');
const viewerState = {
  sessionId: params.get("session") || "",
  viewerId: params.get("viewer") || "",
  token: params.get("token") || "",
  owner: "agent",
  controlVersion: 1,
  frameSeq: 1,
  mode: "observe",
  recording: false,
  sensitive: false,
  approval: null,
  latestFrame: null,
  commandSeq: 1
};
history.replaceState(null, "", location.pathname + (historyOnly ? "?history=1" : ""));
document.body.classList.toggle('history-only', historyOnly);
let ws = null;
const pendingCommandLabels = new Map();

let cursorPos = { x: 960, y: 540 };
let currentViewport = { width: 1920, height: 1080 };
let currentFrameSize = { width: 1920, height: 1080 };

function mapViewerPoint(event, frameMeta, wrapEl) {
  const rect = wrapEl.getBoundingClientRect();
  const viewportWidth = Number(frameMeta.viewportCssWidth || frameMeta.viewport?.width || 0);
  const viewportHeight = Number(frameMeta.viewportCssHeight || frameMeta.viewport?.height || 0);
  const frameSize = frameDisplaySize(frameMeta);
  const scale = Math.min(rect.width / frameSize.width, rect.height / frameSize.height);
  const renderedWidth = frameSize.width * scale;
  const renderedHeight = frameSize.height * scale;
  const letterboxX = (rect.width - renderedWidth) / 2;
  const letterboxY = (rect.height - renderedHeight) / 2;
  const imageX = (event.clientX - rect.left - letterboxX) / scale;
  const imageY = (event.clientY - rect.top - letterboxY) / scale;
  return {
    x: imageX * (viewportWidth / frameSize.width),
    y: imageY * (viewportHeight / frameSize.height),
    scale,
    letterboxX,
    letterboxY
  };
}

function frameDisplaySize(frameMeta) {
  const width = Number(frameMeta.capturePixelWidth || frameMeta.capture_pixel_width || frameMeta.viewportCssWidth || frameMeta.viewport?.width || currentFrameSize.width || 1920);
  const height = Number(frameMeta.capturePixelHeight || frameMeta.capture_pixel_height || frameMeta.viewportCssHeight || frameMeta.viewport?.height || currentFrameSize.height || 1080);
  return {
    width: width > 0 ? width : 1920,
    height: height > 0 ? height : 1080
  };
}

function nextCommandId() {
  return `cmd_${Date.now()}_${viewerState.commandSeq++}`;
}

function sendViewerCommand(type, payload, labelText) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const commandId = nextCommandId();
  if (labelText) pendingCommandLabels.set(commandId, labelText);
  ws.send(JSON.stringify({
    schema: "ViewerCommandV1",
    commandId,
    sessionId: viewerState.sessionId,
    viewerId: viewerState.viewerId,
    owner: viewerState.owner,
    controlVersion: viewerState.controlVersion,
    frameSeq: viewerState.frameSeq,
    type,
    payload
  }));
  return commandId;
}

function applyViewport(vp) {
  if (!vp || !vp.width || !vp.height) return;
  if (vp.width === currentViewport.width && vp.height === currentViewport.height) return;
  currentViewport = { width: vp.width, height: vp.height };
  const overlay = document.getElementById('overlay');
  overlay.setAttribute('viewBox', `0 0 ${vp.width} ${vp.height}`);
}

function applyFrameSize(frameMeta) {
  const size = frameDisplaySize(frameMeta || {});
  if (size.width === currentFrameSize.width && size.height === currentFrameSize.height) return;
  currentFrameSize = size;
  document.documentElement.style.setProperty('--frame-w', size.width);
  document.documentElement.style.setProperty('--frame-h', size.height);
  document.documentElement.style.setProperty('--frame-ratio', size.width / size.height);
}

function setStatus(msg, live = false) {
  status.textContent = historyOnly && live ? 'history · ' + msg : msg;
  status.classList.toggle('live', live);
}

function moveCursor(x, y) {
  cursorPos = { x, y };
  cursor.setAttribute('transform', `translate(${x}, ${y})`);
}

function showLabel(text, x, y) {
  label.textContent = text;
  const wrapRect = wrap.getBoundingClientRect();
  const px = (x / currentViewport.width) * wrapRect.width;
  const py = (y / currentViewport.height) * wrapRect.height;
  label.style.left = px + 'px';
  label.style.top = py + 'px';
  label.classList.add('show');
}

function hideLabel() {
  label.classList.remove('show');
}

function ripple(x, y, failed = false) {
  const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  c.setAttribute('cx', x);
  c.setAttribute('cy', y);
  c.setAttribute('r', 8);
  c.setAttribute('class', failed ? 'ripple fail' : 'ripple');
  ripples.appendChild(c);
  setTimeout(() => c.remove(), 800);
  if (failed) {
    // Draw an X over the failure point
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('transform', `translate(${x},${y})`);
    g.style.transformOrigin = `${x}px ${y}px`;
    const s = 12;
    const l1 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    l1.setAttribute('x1', -s); l1.setAttribute('y1', -s); l1.setAttribute('x2', s); l1.setAttribute('y2', s);
    l1.setAttribute('class', 'fail-x');
    const l2 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    l2.setAttribute('x1', -s); l2.setAttribute('y1', s); l2.setAttribute('x2', s); l2.setAttribute('y2', -s);
    l2.setAttribute('class', 'fail-x');
    g.appendChild(l1); g.appendChild(l2);
    ripples.appendChild(g);
    setTimeout(() => g.remove(), 800);
  }
}

function clampToViewport(bbox, vp) {
  // Clamp bbox center to inside viewport so cursor stays visible even when
  // target is offscreen (e.g. negative y means scrolled-up element).
  const cx = bbox.x + bbox.w / 2;
  const cy = bbox.y + bbox.h / 2;
  return {
    x: Math.max(20, Math.min(vp.width - 20, cx)),
    y: Math.max(20, Math.min(vp.height - 20, cy)),
    onscreen: cx >= 0 && cx <= vp.width && cy >= 0 && cy <= vp.height,
  };
}

function showRing(bbox) {
  // Only show ring if target is at least partly onscreen
  if (bbox.x + bbox.w < 0 || bbox.y + bbox.h < 0) { ring.classList.remove('armed'); return; }
  ring.setAttribute('x', bbox.x);
  ring.setAttribute('y', bbox.y);
  ring.setAttribute('width', bbox.w);
  ring.setAttribute('height', bbox.h);
  ring.classList.add('armed');
}

function hideRing() { ring.classList.remove('armed'); }

let lastFrameDataUrl = null;
function handleEvent(evt) {
  if (evt.type === 'snapshot') {
    setGoal(evt.goal);
    applyControlState(evt.control || 'running');
    if (evt.sharedControl) applyControlState(evt.sharedControl);
    renderApproval(evt.approval || null);
    for (const item of evt.history || []) handleEvent(item);
    return;
  }
  if (evt.type === 'frame') {
    viewerState.latestFrame = evt;
    viewerState.frameSeq = evt.frameSeq || viewerState.frameSeq;
    if (evt.viewport) applyViewport(evt.viewport);
    applyFrameSize(evt);
    lastFrameDataUrl = 'data:image/jpeg;base64,' + (evt.dataBase64 || evt.data);
    frame.src = lastFrameDataUrl;
    return;
  }
  if (evt.viewport) applyViewport(evt.viewport);
  if (evt.type === 'commandAccepted') {
    viewerState.controlVersion = evt.controlVersion || viewerState.controlVersion;
    viewerState.frameSeq = evt.frameSeq || viewerState.frameSeq;
    const commandLabel = pendingCommandLabels.get(evt.commandId) || evt.commandId || '';
    pendingCommandLabels.delete(evt.commandId);
    setStatus(`accepted ${commandLabel}`, true);
    if (commandLabel) pushCommandHistory(commandLabel, true);
    return;
  }
  if (evt.type === 'commandRejected') {
    const commandLabel = pendingCommandLabels.get(evt.commandId) || evt.commandId || '';
    pendingCommandLabels.delete(evt.commandId);
    if (commandLabel) pushCommandHistory(commandLabel, false);
    setStatus(`rejected · ${evt.reason}: ${evt.message}`);
    if (evt.reason === 'approval_required') {
      renderApproval({
        summary: 'Approval required',
        origin: location.host,
        expiresAtMs: Date.now() + 30000
      });
    }
    return;
  }
  if (evt.controlVersion) viewerState.controlVersion = evt.controlVersion;
  if (evt.frameSeq) viewerState.frameSeq = evt.frameSeq;
  if (evt.control) applyControlState(evt.control);
  if (evt.type === 'intent') {
    if (evt.target?.bbox) {
      const aimRect = evt.target.bbox.aim || evt.target.bbox;
      const aim = clampToViewport(aimRect, currentViewport);
      moveCursor(aim.x, aim.y);
      showRing(evt.target.bbox);
      showLabel(evt.label, aim.x, aim.y);
    } else {
      showLabel(evt.label, cursorPos.x, cursorPos.y);
    }
    pushHistory(evt);
    return;
  }
  if (evt.type === 'complete') {
    if (evt.target?.bbox) {
      const aimRect = evt.target.bbox.aim || evt.target.bbox;
      const aim = clampToViewport(aimRect, currentViewport);
      ripple(aim.x, aim.y, evt.success === false);
    } else if (evt.success === false) {
      ripple(cursorPos.x, cursorPos.y, true);
    }
    hideRing();
    setTimeout(hideLabel, 600);
    completeHistory(evt);
    return;
  }
  if (evt.type === 'refs') {
    renderRefs(evt.refs || []);
    return;
  }
  if (evt.type === 'control') {
    applyControlState(evt.state);
    renderApproval(evt.approval || null);
    return;
  }
  if (evt.type === 'goal') {
    setGoal(evt.text);
    return;
  }
}

const goalEl = document.getElementById('goal');
function setGoal(text) {
  if (text) {
    goalEl.textContent = text;
    goalEl.classList.add('show');
  } else {
    goalEl.classList.remove('show');
  }
}

// ── History rail ────────────────────────────────────────────────────────
const historyEl = document.getElementById('history');
const histPreview = document.getElementById('hist-preview');
const histItems = []; // { node, frameAtIntent, frameAtComplete }
const MAX_HISTORY = 20;

function fmtTime(ms) {
  const d = new Date(ms);
  return d.toLocaleTimeString('en-US', { hour12: false }).slice(3); // mm:ss
}

function pushHistory(intentEvt) {
  const node = document.createElement('div');
  node.className = 'hist-item pending';
  node.innerHTML = `<span class="dot"></span><span class="label"></span><span class="time"></span>`;
  node.querySelector('.label').textContent = intentEvt.label;
  node.querySelector('.time').textContent = fmtTime(intentEvt.timestamp_ms || intentEvt.timestamp || Date.now());
  const item = { node, frameBefore: lastFrameDataUrl, frameAfter: null, label: intentEvt.label };
  node.addEventListener('mouseenter', (e) => showHistPreview(item, e));
  node.addEventListener('mousemove', (e) => positionHistPreview(e));
  node.addEventListener('mouseleave', hideHistPreview);
  historyEl.appendChild(node);
  histItems.push(item);
  if (histItems.length > MAX_HISTORY) {
    const old = histItems.shift();
    old.node.remove();
  }
}

function pushCommandHistory(labelText, success) {
  const node = document.createElement('div');
  node.className = `hist-item ${success ? 'success' : 'fail'}`;
  node.innerHTML = `<span class="dot"></span><span class="label"></span><span class="time"></span>`;
  node.querySelector('.label').textContent = labelText;
  node.querySelector('.time').textContent = fmtTime(Date.now());
  const item = { node, frameBefore: lastFrameDataUrl, frameAfter: lastFrameDataUrl, label: labelText };
  node.addEventListener('mouseenter', (e) => showHistPreview(item, e));
  node.addEventListener('mousemove', (e) => positionHistPreview(e));
  node.addEventListener('mouseleave', hideHistPreview);
  historyEl.appendChild(node);
  histItems.push(item);
  if (histItems.length > MAX_HISTORY) {
    const old = histItems.shift();
    old.node.remove();
  }
}

function completeHistory(completeEvt) {
  const item = histItems[histItems.length - 1];
  if (!item) return;
  item.node.classList.remove('pending');
  item.node.classList.add(completeEvt.success === false ? 'fail' : 'success');
  item.frameAfter = lastFrameDataUrl;
}

function showHistPreview(item, e) {
  if (!item.frameAfter && !item.frameBefore) return;
  histPreview.src = item.frameAfter || item.frameBefore;
  histPreview.classList.add('show');
  positionHistPreview(e);
}
function positionHistPreview(e) {
  // Place preview to the LEFT of the rail
  const railRect = historyEl.getBoundingClientRect();
  histPreview.style.right = (window.innerWidth - railRect.left + 12) + 'px';
  histPreview.style.top = Math.max(70, e.clientY - 160) + 'px';
}
function hideHistPreview() { histPreview.classList.remove('show'); }

let refsVisible = true;
const annotationMarkers = [];
function renderRefs(refs) {
  if (!refsVisible) { refsGroup.innerHTML = ''; return; }
  // Diff is overkill; just rebuild — refs are small (< 80 elements).
  while (refsGroup.firstChild) refsGroup.firstChild.remove();
  for (const r of refs) {
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('class', 'ref-box');
    rect.setAttribute('x', r.x);
    rect.setAttribute('y', r.y);
    rect.setAttribute('width', r.w);
    rect.setAttribute('height', r.h);
    rect.setAttribute('rx', 4);
    rect.dataset.role = r.role;
    rect.dataset.name = r.name;
    rect.addEventListener('mouseenter', (e) => showRefTip(r));
    rect.addEventListener('mouseleave', hideRefTip);
    refsGroup.appendChild(rect);
  }
}

function addAnnotationMarker(x, y) {
  annotationMarkers.push({ x, y });
  renderAnnotationMarkers();
}

function renderAnnotationMarkers() {
  while (annotationMarkersGroup.firstChild) annotationMarkersGroup.firstChild.remove();
  for (const point of annotationMarkers.slice(-20)) {
    const marker = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    marker.setAttribute('class', 'annotation-mark');
    marker.setAttribute('cx', point.x);
    marker.setAttribute('cy', point.y);
    marker.setAttribute('r', 18);
    annotationMarkersGroup.appendChild(marker);

    const core = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    core.setAttribute('class', 'annotation-mark-core');
    core.setAttribute('cx', point.x);
    core.setAttribute('cy', point.y);
    core.setAttribute('r', 5);
    annotationMarkersGroup.appendChild(core);
  }
}

function showRefTip(r) {
  const text = `${r.role}${r.name ? ' · ' + r.name.slice(0, 40) : ''}`;
  refTip.textContent = text;
  const wrapRect = wrap.getBoundingClientRect();
  const px = ((r.x + r.w / 2) / currentViewport.width) * wrapRect.width;
  const py = (r.y / currentViewport.height) * wrapRect.height;
  refTip.style.left = px + 'px';
  refTip.style.top = py + 'px';
  refTip.classList.add('show');
}
function hideRefTip() { refTip.classList.remove('show'); }

// Toggle ref visibility with `r` key
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'r' || e.key === 'R') {
    refsVisible = !refsVisible;
    if (!refsVisible) refsGroup.innerHTML = '';
    setStatus(refsVisible ? 'live · refs ON · press R to hide' : 'live · refs hidden · press R to show', true);
  }
  if (e.key === ' ') { e.preventDefault(); sendControlAction(viewerState.mode === 'paused' ? 'release' : 'pause'); }
  if (e.key === 'ArrowRight') { e.preventDefault(); sendControlAction('step'); }
  if (e.key === 'Escape') { e.preventDefault(); sendControlAction('abort'); }
});

// ── Control bar and input forwarding ────────────────────────────────────
const btnPause = document.getElementById('btn-pause');
const btnStep = document.getElementById('btn-step');
const btnAbort = document.getElementById('btn-abort');
const btnControl = document.getElementById('btn-control');
const btnAnnotate = document.getElementById('btn-annotate');
const btnRecord = document.getElementById('btn-record');
const btnSensitive = document.getElementById('btn-sensitive');
const btnResume = document.getElementById('btn-resume');
const textProxy = document.getElementById('text-proxy');
const approvalEl = document.getElementById('approval');
const approvalSummary = document.getElementById('approval-summary');
const btnApprovalApprove = document.getElementById('approval-approve');
const btnApprovalDeny = document.getElementById('approval-deny');

function sendControlAction(action, reason) {
  sendViewerCommand("control", {
    schema: "ControlCommandV1",
    action,
    reason: reason || null
  }, `control ${action}`);
}

function sendSensitive(enabled) {
  viewerState.sensitive = enabled;
  sendViewerCommand("sensitive", {
    schema: "SensitiveCommandV1",
    enabled,
    reason: enabled ? "viewer sensitive mode" : "viewer sensitive mode off"
  }, enabled ? "sensitive on" : "sensitive off");
  renderModeButtons();
}

function renderApproval(approval) {
  viewerState.approval = approval;
  if (!approval) {
    approvalEl.classList.remove('show');
    approvalSummary.textContent = '';
    return;
  }
  const seconds = Math.max(0, Math.ceil(((approval.expiresAtMs || Date.now()) - Date.now()) / 1000));
  approvalSummary.innerHTML = `${escapeHtml(approval.summary || 'Approval required')} <span id="approval-origin">${escapeHtml(approval.origin || '')} · ${seconds}s</span>`;
  approvalEl.classList.add('show');
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, (ch) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[ch]);
}

function renderModeButtons() {
  btnControl.classList.toggle('active', viewerState.mode === 'control');
  btnAnnotate.classList.toggle('active', viewerState.mode === 'annotate');
  btnRecord.classList.toggle('active', viewerState.recording);
  btnSensitive.classList.toggle('active', viewerState.sensitive);
  btnPause.classList.toggle('active', viewerState.mode === 'paused');
  btnPause.textContent = viewerState.mode === 'paused' ? 'Paused' : 'Pause';
}

function userInputBase(kind) {
  return {
    schema: "UserInputEventV1",
    inputId: `inp_${Date.now()}_${viewerState.commandSeq}`,
    source: "viewer",
    owner: "user",
    controlVersion: viewerState.controlVersion,
    frameSeq: viewerState.frameSeq,
    coordinateSpace: "viewport_css",
    kind
  };
}

function forwardPointer(event, phase) {
  if (viewerState.mode !== "control" || !viewerState.latestFrame) return;
  event.preventDefault();
  const point = mapViewerPoint(event, viewerState.latestFrame, wrap);
  sendViewerCommand("input", {
    ...userInputBase("pointer"),
    phase,
    x: point.x,
    y: point.y,
    button: event.button === 2 ? "right" : "left",
    buttons: event.buttons || undefined
  }, phase === "context_click" ? "context click" : "viewer click");
  textProxy.focus({ preventScroll: true });
}

wrap.addEventListener("click", (event) => forwardPointer(event, "click"));
wrap.addEventListener("click", (event) => {
  if (viewerState.mode !== "annotate" || !viewerState.latestFrame) return;
  event.preventDefault();
  const point = mapViewerPoint(event, viewerState.latestFrame, wrap);
  const annotationId = `ann_${Date.now()}_${viewerState.commandSeq}`;
  addAnnotationMarker(point.x, point.y);
  sendViewerCommand("annotation", {
    schema: "AnnotationCommandV1",
    action: "create",
    annotation: {
      schema: "AnnotationV1",
      annotationId,
      sessionId: viewerState.sessionId,
      viewerId: viewerState.viewerId,
      pageId: null,
      targetId: null,
      frameId: "main",
      frameSeq: viewerState.frameSeq,
      kind: "point",
      status: "open",
      note: "Viewer annotation",
      url: viewerState.latestFrame.url || "",
      title: viewerState.latestFrame.title || "",
      origin: location.origin,
      createdBy: "user",
      createdAtMs: Date.now(),
      viewport: viewerState.latestFrame.viewport || {},
      selection: {
        coordinateSpace: "viewport_css",
        box: { x: point.x, y: point.y, w: 1, h: 1 }
      },
      target: null,
      artifactRefs: {},
      partialReasons: viewerState.sensitive ? ["sensitive_redacted"] : [],
      redactions: viewerState.sensitive ? ["sensitive_redacted"] : []
    }
  }, "annotation added");
}, { capture: true });
wrap.addEventListener("contextmenu", (event) => forwardPointer(event, "context_click"));
wrap.addEventListener("wheel", (event) => {
  if (viewerState.mode !== "control" || !viewerState.latestFrame) return;
  event.preventDefault();
  const point = mapViewerPoint(event, viewerState.latestFrame, wrap);
  sendViewerCommand("input", {
    ...userInputBase("wheel"),
    x: point.x,
    y: point.y,
    deltaX: event.deltaX,
    deltaY: event.deltaY
  }, "viewer scroll");
}, { passive: false });

document.addEventListener("keydown", (event) => {
  if (viewerState.mode !== "control" || event.metaKey || event.ctrlKey) return;
  if (event.key.length !== 1 && !["Enter", "Tab", "Backspace", "Escape", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(event.key)) return;
  event.preventDefault();
  sendViewerCommand("input", {
    ...userInputBase("key"),
    phase: "press",
    key: event.key,
    code: event.code,
    repeat: event.repeat,
    modifiers: [
      event.shiftKey ? "shift" : null,
      event.altKey ? "alt" : null,
      event.metaKey ? "meta" : null,
      event.ctrlKey ? "ctrl" : null
    ].filter(Boolean)
  }, `key ${event.key}`);
});

textProxy.addEventListener("beforeinput", (event) => {
  if (viewerState.mode !== "control" || !event.data) return;
  sendViewerCommand("input", {
    ...userInputBase("text"),
    text: event.data
  }, "viewer text");
  event.preventDefault();
});

textProxy.addEventListener("paste", (event) => {
  if (viewerState.mode !== "control") return;
  const text = event.clipboardData?.getData("text/plain") || "";
  if (!text) return;
  sendViewerCommand("input", {
    ...userInputBase("paste"),
    text
  }, "viewer paste");
  event.preventDefault();
});

btnControl.addEventListener('click', () => {
  viewerState.owner = "user";
  viewerState.mode = "control";
  sendControlAction('takeover');
  textProxy.focus({ preventScroll: true });
  renderModeButtons();
});
btnAnnotate.addEventListener('click', () => {
  viewerState.owner = "user";
  viewerState.mode = "annotate";
  sendControlAction('annotate');
  renderModeButtons();
});
btnRecord.addEventListener('click', () => {
  viewerState.recording = !viewerState.recording;
  sendViewerCommand("recording", {
    schema: "RecordingCommandV1",
    action: viewerState.recording ? "start" : "stop",
    name: "viewer-flow",
    recordingId: null
  }, viewerState.recording ? "recording started" : "recording stopped");
  renderModeButtons();
});
btnSensitive.addEventListener('click', () => sendSensitive(!viewerState.sensitive));
btnPause.addEventListener('click', () => {
  viewerState.mode = "paused";
  sendControlAction('pause');
  renderModeButtons();
});
btnStep.addEventListener('click', () => sendControlAction('step'));
btnResume.addEventListener('click', () => {
  viewerState.mode = "observe";
  viewerState.owner = "agent";
  sendControlAction('release');
  renderModeButtons();
});
btnAbort.addEventListener('click', () => sendControlAction('abort'));
btnApprovalApprove.addEventListener('click', () => {
  sendControlAction('approve', 'viewer approved risk gate');
  renderApproval(null);
});
btnApprovalDeny.addEventListener('click', () => {
  sendControlAction('deny', 'viewer denied risk gate');
  renderApproval(null);
});

function applyControlState(state) {
  if (typeof state === 'string') {
    viewerState.mode = state === 'paused' ? 'paused' : 'observe';
  } else if (state) {
    viewerState.owner = state.owner || viewerState.owner;
    viewerState.controlVersion = state.controlVersion || viewerState.controlVersion;
    viewerState.frameSeq = state.frameSeq || viewerState.frameSeq;
    viewerState.sensitive = Boolean(state.sensitive);
    const mode = state.mode || "";
    viewerState.mode = mode === "user-takeover" ? "control" :
      mode === "annotating" ? "annotate" :
      mode === "paused" ? "paused" :
      mode === "sensitive" ? "control" :
      "observe";
  }
  renderModeButtons();
}

function connect() {
  const query = new URLSearchParams({
    session: viewerState.sessionId,
    viewer: viewerState.viewerId,
    token: viewerState.token
  });
  ws = new WebSocket('ws://' + location.host + '/ws?' + query.toString());
  ws.onopen = () => setStatus(`live · ${location.host}`, true);
  ws.onclose = () => { setStatus('disconnected · retrying…'); setTimeout(connect, 1000); };
  ws.onerror = () => setStatus('viewer connection error');
  ws.onmessage = (m) => {
    try { handleEvent(JSON.parse(m.data)); } catch (e) { console.error(e); }
  };
}
connect();
</script>
</body>
