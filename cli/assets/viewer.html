<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>gsd-cursor viewer</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; padding: 0; background: #0a0a0c; color: #ddd; font-family: -apple-system, ui-sans-serif, system-ui, sans-serif; height: 100%; overflow: hidden; }
  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #wrap {
    position: relative;
    aspect-ratio: var(--vp-w, 1920) / var(--vp-h, 1080);
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
    box-shadow: 0 8px 60px rgba(0,0,0,0.6);
    background: #111;
  }
  #frame {
    width: 100%;
    height: 100%;
    display: block;
    image-rendering: crisp-edges;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
  }
  #status {
    position: fixed;
    bottom: 12px; left: 12px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-family: ui-monospace, Menlo, monospace;
    color: #aaa;
  }
  #status.live::before {
    content: "●";
    color: #2ecc71;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 50% { opacity: 0.3; } }

  /* Control bar */
  #controls {
    position: fixed;
    top: 12px; right: 12px;
    display: flex;
    gap: 8px;
    z-index: 10;
  }
  .ctrl-btn {
    background: rgba(20, 20, 24, 0.85);
    backdrop-filter: blur(12px);
    color: #ddd;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: background 120ms ease, color 120ms ease, border-color 120ms ease;
  }
  .ctrl-btn:hover { background: rgba(40, 40, 48, 0.95); }
  .ctrl-btn.active { background: rgba(76, 194, 255, 0.18); color: #4cc2ff; border-color: rgba(76, 194, 255, 0.5); }
  .ctrl-btn.danger:hover { background: rgba(220, 60, 60, 0.25); color: #ff8a8a; border-color: rgba(220, 60, 60, 0.5); }
  .ctrl-btn .key {
    margin-left: 8px;
    font-family: ui-monospace, Menlo, monospace;
    font-size: 10px;
    opacity: 0.5;
    border: 1px solid rgba(255,255,255,0.15);
    padding: 1px 5px;
    border-radius: 4px;
  }

  /* History rail */
  #history {
    position: fixed;
    top: 70px; right: 12px;
    bottom: 70px;
    width: 260px;
    overflow-y: auto;
    z-index: 8;
    display: flex;
    flex-direction: column-reverse;
    gap: 6px;
    padding-right: 6px;
    pointer-events: none;
  }
  #history::-webkit-scrollbar { width: 6px; }
  #history::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  .hist-item {
    background: rgba(20, 20, 24, 0.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 8px 12px;
    color: #ddd;
    font-size: 12px;
    pointer-events: auto;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 120ms ease, border-color 120ms ease;
    flex-shrink: 0;
  }
  .hist-item:hover { background: rgba(40, 40, 48, 0.95); border-color: rgba(76, 194, 255, 0.4); }
  .hist-item .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .hist-item.success .dot { background: #4cc2ff; }
  .hist-item.fail .dot { background: #ff6464; }
  .hist-item.pending .dot { background: #ffd54a; animation: pulse 1.2s infinite; }
  .hist-item .label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hist-item .time { font-family: ui-monospace, Menlo, monospace; font-size: 10px; opacity: 0.5; flex-shrink: 0; }
  #hist-preview {
    position: fixed;
    pointer-events: none;
    border: 2px solid rgba(76, 194, 255, 0.6);
    border-radius: 8px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.7);
    max-width: 480px;
    max-height: 320px;
    z-index: 11;
    opacity: 0;
    transition: opacity 120ms ease;
    background: #000;
  }
  #hist-preview.show { opacity: 1; }

  /* Goal banner */
  #goal {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20, 20, 24, 0.85);
    backdrop-filter: blur(12px);
    color: #fff;
    padding: 10px 18px;
    border-radius: 12px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    max-width: 60vw;
    text-align: center;
    z-index: 9;
    opacity: 0;
    pointer-events: none;
    transition: opacity 240ms ease;
  }
  #goal.show { opacity: 1; }
  #goal::before {
    content: "🎯";
    margin-right: 8px;
    opacity: 0.7;
  }

  /* Cursor */
  .cursor {
    transition: transform 320ms cubic-bezier(0.22, 0.61, 0.36, 1);
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.7));
  }

  /* Target ring */
  .ring {
    fill: none;
    stroke: #4cc2ff;
    stroke-width: 3;
    opacity: 0;
    transition: opacity 200ms ease;
  }
  .ring.armed {
    opacity: 0.95;
    animation: ringPulse 0.8s ease-out infinite;
  }
  @keyframes ringPulse {
    0% { stroke-width: 3; opacity: 1; }
    50% { stroke-width: 6; opacity: 0.6; }
    100% { stroke-width: 3; opacity: 1; }
  }

  /* Click ripple */
  .ripple {
    fill: #ffd54a;
    fill-opacity: 0.5;
    stroke: #ffd54a;
    stroke-width: 2;
    animation: rippleAnim 600ms ease-out forwards;
  }
  .ripple.fail {
    fill: #ff6464;
    stroke: #ff6464;
    animation: rippleFail 800ms ease-out forwards;
  }
  @keyframes rippleAnim {
    0% { r: 8; fill-opacity: 0.5; stroke-opacity: 1; }
    100% { r: 60; fill-opacity: 0; stroke-opacity: 0; }
  }
  @keyframes rippleFail {
    0% { r: 8; fill-opacity: 0.6; stroke-opacity: 1; stroke-width: 3; }
    100% { r: 80; fill-opacity: 0; stroke-opacity: 0; stroke-width: 1; }
  }
  /* Failure X — drawn briefly at the failure point */
  .fail-x {
    stroke: #ff6464;
    stroke-width: 4;
    stroke-linecap: round;
    fill: none;
    animation: failX 800ms ease-out forwards;
  }
  @keyframes failX {
    0% { opacity: 1; transform: scale(0.4); }
    30% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.2); }
  }

  /* Action label */
  #label {
    position: absolute;
    background: rgba(20, 20, 24, 0.92);
    backdrop-filter: blur(12px);
    color: #fff;
    padding: 6px 12px;
    border-radius: 18px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.01em;
    transform: translate(-50%, -120%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 200ms ease, transform 320ms cubic-bezier(0.22, 0.61, 0.36, 1);
    white-space: nowrap;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  }
  #label.show { opacity: 1; }

  /* Ref hover boxes */
  #refs { pointer-events: auto; }
  .ref-box {
    fill: transparent;
    stroke: rgba(76, 194, 255, 0);
    stroke-width: 1.5;
    cursor: crosshair;
    transition: stroke 120ms ease, fill 120ms ease;
  }
  .ref-box:hover {
    stroke: rgba(76, 194, 255, 0.9);
    fill: rgba(76, 194, 255, 0.08);
  }
  #ref-tip {
    position: absolute;
    background: rgba(20, 20, 24, 0.95);
    backdrop-filter: blur(12px);
    color: #fff;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-family: ui-monospace, Menlo, monospace;
    pointer-events: none;
    opacity: 0;
    transition: opacity 120ms ease;
    white-space: nowrap;
    border: 1px solid rgba(76, 194, 255, 0.3);
    transform: translate(-50%, -130%);
  }
  #ref-tip.show { opacity: 1; }
</style>
</head>
<body>
<div id="stage">
  <div id="wrap">
    <img id="frame" alt="">
    <svg id="overlay" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet">
      <g id="refs"></g>
      <rect id="ring" class="ring" x="0" y="0" width="0" height="0" rx="6" ry="6"></rect>
      <g id="ripples"></g>
      <!-- macOS-style arrow cursor at (0,0) origin -->
      <g id="cursor" class="cursor" transform="translate(960, 540)">
        <path d="M0 0 L0 28 L7 22 L11 32 L15 30 L11 20 L20 20 Z"
              fill="#fff" stroke="#000" stroke-width="1.5" stroke-linejoin="round"/>
      </g>
    </svg>
    <div id="label"></div>
    <div id="ref-tip"></div>
  </div>
</div>
<div id="status">connecting…</div>
<div id="goal"></div>
<div id="history"></div>
<img id="hist-preview" alt="">
<div id="controls">
  <button id="btn-pause" class="ctrl-btn">Pause<span class="key">␣</span></button>
  <button id="btn-step" class="ctrl-btn">Step<span class="key">→</span></button>
  <button id="btn-abort" class="ctrl-btn danger">Abort<span class="key">⎋</span></button>
</div>

<script>
const frame = document.getElementById('frame');
const cursor = document.getElementById('cursor');
const ring = document.getElementById('ring');
const ripples = document.getElementById('ripples');
const refsGroup = document.getElementById('refs');
const refTip = document.getElementById('ref-tip');
const label = document.getElementById('label');
const wrap = document.getElementById('wrap');
const status = document.getElementById('status');

let cursorPos = { x: 960, y: 540 };
let currentViewport = { width: 1920, height: 1080 };

function applyViewport(vp) {
  if (!vp || !vp.width || !vp.height) return;
  if (vp.width === currentViewport.width && vp.height === currentViewport.height) return;
  currentViewport = { width: vp.width, height: vp.height };
  const overlay = document.getElementById('overlay');
  overlay.setAttribute('viewBox', `0 0 ${vp.width} ${vp.height}`);
  document.documentElement.style.setProperty('--vp-w', vp.width);
  document.documentElement.style.setProperty('--vp-h', vp.height);
}

// When a frame image actually loads, its naturalWidth/Height tell us the true
// captured dimensions. Chrome's headless captureScreenshot returns only the
// visible client area (e.g. 1920x937), not the full layout viewport, so the
// viewer must size to the image, not to layout-metrics.
frame.addEventListener('load', () => {
  const w = frame.naturalWidth, h = frame.naturalHeight;
  if (w && h) applyViewport({ width: w, height: h });
});

function setStatus(msg, live = false) {
  status.textContent = msg;
  status.classList.toggle('live', live);
}

function moveCursor(x, y) {
  cursorPos = { x, y };
  cursor.setAttribute('transform', `translate(${x}, ${y})`);
}

function showLabel(text, x, y) {
  label.textContent = text;
  const wrapRect = wrap.getBoundingClientRect();
  const px = (x / currentViewport.width) * wrapRect.width;
  const py = (y / currentViewport.height) * wrapRect.height;
  label.style.left = px + 'px';
  label.style.top = py + 'px';
  label.classList.add('show');
}

function hideLabel() {
  label.classList.remove('show');
}

function ripple(x, y, failed = false) {
  const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  c.setAttribute('cx', x);
  c.setAttribute('cy', y);
  c.setAttribute('r', 8);
  c.setAttribute('class', failed ? 'ripple fail' : 'ripple');
  ripples.appendChild(c);
  setTimeout(() => c.remove(), 800);
  if (failed) {
    // Draw an X over the failure point
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('transform', `translate(${x},${y})`);
    g.style.transformOrigin = `${x}px ${y}px`;
    const s = 12;
    const l1 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    l1.setAttribute('x1', -s); l1.setAttribute('y1', -s); l1.setAttribute('x2', s); l1.setAttribute('y2', s);
    l1.setAttribute('class', 'fail-x');
    const l2 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    l2.setAttribute('x1', -s); l2.setAttribute('y1', s); l2.setAttribute('x2', s); l2.setAttribute('y2', -s);
    l2.setAttribute('class', 'fail-x');
    g.appendChild(l1); g.appendChild(l2);
    ripples.appendChild(g);
    setTimeout(() => g.remove(), 800);
  }
}

function clampToViewport(bbox, vp) {
  // Clamp bbox center to inside viewport so cursor stays visible even when
  // target is offscreen (e.g. negative y means scrolled-up element).
  const cx = bbox.x + bbox.w / 2;
  const cy = bbox.y + bbox.h / 2;
  return {
    x: Math.max(20, Math.min(vp.width - 20, cx)),
    y: Math.max(20, Math.min(vp.height - 20, cy)),
    onscreen: cx >= 0 && cx <= vp.width && cy >= 0 && cy <= vp.height,
  };
}

function showRing(bbox) {
  // Only show ring if target is at least partly onscreen
  if (bbox.x + bbox.w < 0 || bbox.y + bbox.h < 0) { ring.classList.remove('armed'); return; }
  ring.setAttribute('x', bbox.x);
  ring.setAttribute('y', bbox.y);
  ring.setAttribute('width', bbox.w);
  ring.setAttribute('height', bbox.h);
  ring.classList.add('armed');
}

function hideRing() { ring.classList.remove('armed'); }

let lastFrameDataUrl = null;
function handleEvent(evt) {
  if (evt.type === 'snapshot') {
    setGoal(evt.goal);
    applyControlState(evt.control || 'running');
    for (const item of evt.history || []) handleEvent(item);
    return;
  }
  if (evt.viewport) applyViewport(evt.viewport);
  if (evt.type === 'frame') {
    lastFrameDataUrl = 'data:image/jpeg;base64,' + evt.data;
    frame.src = lastFrameDataUrl;
    return;
  }
  if (evt.type === 'intent') {
    if (evt.target?.bbox) {
      const aimRect = evt.target.bbox.aim || evt.target.bbox;
      const aim = clampToViewport(aimRect, currentViewport);
      moveCursor(aim.x, aim.y);
      showRing(evt.target.bbox);
      showLabel(evt.label, aim.x, aim.y);
    } else {
      showLabel(evt.label, cursorPos.x, cursorPos.y);
    }
    pushHistory(evt);
    return;
  }
  if (evt.type === 'complete') {
    if (evt.target?.bbox) {
      const aimRect = evt.target.bbox.aim || evt.target.bbox;
      const aim = clampToViewport(aimRect, currentViewport);
      ripple(aim.x, aim.y, evt.success === false);
    } else if (evt.success === false) {
      ripple(cursorPos.x, cursorPos.y, true);
    }
    hideRing();
    setTimeout(hideLabel, 600);
    completeHistory(evt);
    return;
  }
  if (evt.type === 'refs') {
    renderRefs(evt.refs || []);
    return;
  }
  if (evt.type === 'control') {
    applyControlState(evt.state);
    return;
  }
  if (evt.type === 'goal') {
    setGoal(evt.text);
    return;
  }
}

const goalEl = document.getElementById('goal');
function setGoal(text) {
  if (text) {
    goalEl.textContent = text;
    goalEl.classList.add('show');
  } else {
    goalEl.classList.remove('show');
  }
}

// ── History rail ────────────────────────────────────────────────────────
const historyEl = document.getElementById('history');
const histPreview = document.getElementById('hist-preview');
const histItems = []; // { node, frameAtIntent, frameAtComplete }
const MAX_HISTORY = 20;

function fmtTime(ms) {
  const d = new Date(ms);
  return d.toLocaleTimeString('en-US', { hour12: false }).slice(3); // mm:ss
}

function pushHistory(intentEvt) {
  const node = document.createElement('div');
  node.className = 'hist-item pending';
  node.innerHTML = `<span class="dot"></span><span class="label"></span><span class="time"></span>`;
  node.querySelector('.label').textContent = intentEvt.label;
  node.querySelector('.time').textContent = fmtTime(intentEvt.timestamp_ms || intentEvt.timestamp || Date.now());
  const item = { node, frameBefore: lastFrameDataUrl, frameAfter: null, label: intentEvt.label };
  node.addEventListener('mouseenter', (e) => showHistPreview(item, e));
  node.addEventListener('mousemove', (e) => positionHistPreview(e));
  node.addEventListener('mouseleave', hideHistPreview);
  historyEl.appendChild(node);
  histItems.push(item);
  if (histItems.length > MAX_HISTORY) {
    const old = histItems.shift();
    old.node.remove();
  }
}

function completeHistory(completeEvt) {
  const item = histItems[histItems.length - 1];
  if (!item) return;
  item.node.classList.remove('pending');
  item.node.classList.add(completeEvt.success === false ? 'fail' : 'success');
  item.frameAfter = lastFrameDataUrl;
}

function showHistPreview(item, e) {
  if (!item.frameAfter && !item.frameBefore) return;
  histPreview.src = item.frameAfter || item.frameBefore;
  histPreview.classList.add('show');
  positionHistPreview(e);
}
function positionHistPreview(e) {
  // Place preview to the LEFT of the rail
  const railRect = historyEl.getBoundingClientRect();
  histPreview.style.right = (window.innerWidth - railRect.left + 12) + 'px';
  histPreview.style.top = Math.max(70, e.clientY - 160) + 'px';
}
function hideHistPreview() { histPreview.classList.remove('show'); }

let refsVisible = true;
function renderRefs(refs) {
  if (!refsVisible) { refsGroup.innerHTML = ''; return; }
  // Diff is overkill; just rebuild — refs are small (< 80 elements).
  while (refsGroup.firstChild) refsGroup.firstChild.remove();
  for (const r of refs) {
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('class', 'ref-box');
    rect.setAttribute('x', r.x);
    rect.setAttribute('y', r.y);
    rect.setAttribute('width', r.w);
    rect.setAttribute('height', r.h);
    rect.setAttribute('rx', 4);
    rect.dataset.role = r.role;
    rect.dataset.name = r.name;
    rect.addEventListener('mouseenter', (e) => showRefTip(r));
    rect.addEventListener('mouseleave', hideRefTip);
    refsGroup.appendChild(rect);
  }
}

function showRefTip(r) {
  const text = `${r.role}${r.name ? ' · ' + r.name.slice(0, 40) : ''}`;
  refTip.textContent = text;
  const wrapRect = wrap.getBoundingClientRect();
  const px = ((r.x + r.w / 2) / currentViewport.width) * wrapRect.width;
  const py = (r.y / currentViewport.height) * wrapRect.height;
  refTip.style.left = px + 'px';
  refTip.style.top = py + 'px';
  refTip.classList.add('show');
}
function hideRefTip() { refTip.classList.remove('show'); }

// Toggle ref visibility with `r` key
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'r' || e.key === 'R') {
    refsVisible = !refsVisible;
    if (!refsVisible) refsGroup.innerHTML = '';
    setStatus(refsVisible ? 'live · refs ON · press R to hide' : 'live · refs hidden · press R to show', true);
  }
  if (e.key === ' ') { e.preventDefault(); togglePause(); }
  if (e.key === 'ArrowRight') { e.preventDefault(); sendControl('step'); }
  if (e.key === 'Escape') { e.preventDefault(); sendControl('aborted'); }
});

// ── Control bar (pause / step / abort) ──────────────────────────────────
let controlState = 'running';
const btnPause = document.getElementById('btn-pause');
const btnStep = document.getElementById('btn-step');
const btnAbort = document.getElementById('btn-abort');

async function sendControl(state) {
  try {
    await fetch('/control', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ state }),
    });
  } catch {}
}
function togglePause() {
  sendControl(controlState === 'paused' ? 'running' : 'paused');
}
btnPause.addEventListener('click', togglePause);
btnStep.addEventListener('click', () => sendControl('step'));
btnAbort.addEventListener('click', () => sendControl('aborted'));

function applyControlState(state) {
  controlState = state;
  btnPause.classList.toggle('active', state === 'paused');
  btnPause.textContent = state === 'paused' ? 'Resume' : 'Pause';
  // re-add the keycap span
  const k = document.createElement('span');
  k.className = 'key'; k.textContent = '␣';
  btnPause.appendChild(k);
  if (state === 'aborted') {
    setStatus('aborted · refresh page to reset', false);
  }
}

function connect() {
  const ws = new WebSocket('ws://' + location.host + '/ws');
  ws.onopen = () => setStatus(`live · ${location.host}`, true);
  ws.onclose = () => { setStatus('disconnected · retrying…'); setTimeout(connect, 1000); };
  ws.onerror = () => setStatus('viewer connection error');
  ws.onmessage = (m) => {
    try { handleEvent(JSON.parse(m.data)); } catch (e) { console.error(e); }
  };
}
connect();
</script>
</body>
</html>
